  <div class="breadcrumb">
    <a href="index.html">Home</a> &gt;
    <a href="dashboard.html">Learning Dashboard</a> &gt;
    Coach Feedback
  </div>

  <main class="feedback-page">
    <h1>Coach Feedback</h1>
    <p class="feedback-subtitle">Share your experience and help our coaches improve their lessons.</p>

    <form action="coach-feedback.html" method="get" class="feedback-form">

      <div class="form-row">
        <label for="teacher-select">Select a Coach:</label>
        <select id="teacher-select" name="teacher" required>
          <option value="" disabled selected>Choose a coach</option>
          <option value="izzy">Izzy</option>
          <option value="nicole">Nicole</option>
        </select>
      </div>

      <div class="form-row">
        <label>Rating:</label>
        <div class="rating-options">
          <label><input type="radio" name="rating" value="5" required> &#9733;&#9733;&#9733;&#9733;&#9733; Excellent</label>
          <label><input type="radio" name="rating" value="4"> &#9733;&#9733;&#9733;&#9733; Very Good</label>
          <label><input type="radio" name="rating" value="3"> &#9733;&#9733;&#9733; Good</label>
          <label><input type="radio" name="rating" value="2"> &#9733;&#9733; Fair</label>
          <label><input type="radio" name="rating" value="1"> &#9733; Needs Improvement</label>
        </div>
      </div>

      <div class="form-row">
        <label for="feedback-text">Your Feedback:</label>
        <textarea id="feedback-text" name="feedback" rows="5" placeholder="Tell us about your experience with this coach..."></textarea>
      </div>

      <div class="form-row">
        <button type="submit" class="btn-send">Submit Feedback</button>
      </div>

    </form>
  </main>
